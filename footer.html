<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Footer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0c0c0c;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    /* ═══ FOOTER ═══ */
    .ft {
      position: relative;
      width: 100vw;
      height: 24.653vw;
      background: #0c0c0c;
      overflow: hidden;
    }

    /* ── Inner dark panel ── */
    .ft__panel {
      position: absolute;
      left: 0;
      top: 4.167vw;
      width: 100%;
      height: 20.486vw;
      background: #111;
    }

    /* ── Logo ── */
    .ft__logo {
      position: absolute;
      left: 9.583vw;
      top: 6.597vw;
      width: 2.222vw;
      height: 2.222vw;
      display: block;
    }

    /* ── Social links ── */
    .ft__social {
      position: absolute;
      left: 9.375vw;
      font-weight: 300;
      font-size: 0.972vw;
      line-height: 1.389vw;
      color: #cfcfcf;
      text-transform: uppercase;
      text-decoration: none;
      letter-spacing: 0.03em;
      display: block;
      transition: color 0.25s ease;
    }
    .ft__social:hover { color: #fff; }

    .ft__social-instagram { top: 16.181vw; }
    .ft__social-youtube   { top: 18.611vw; }
    .ft__social-tiktok    { top: 20.694vw; }

    /* ── Column headers ── */
    .ft__col-title {
      position: absolute;
      top: 7.014vw;
      font-weight: 300;
      font-size: 1.111vw;
      line-height: 1.389vw;
      color: #fff;
      text-transform: uppercase;
    }

    .ft__col-title-nav     { left: 37.569vw; }
    .ft__col-title-contact { left: 54.514vw; }
    .ft__col-title-talk    { left: 73.264vw; }

    /* ── Nav links ── */
    .ft__nav {
      position: absolute;
      left: 37.569vw;
      top: 9.931vw;
      font-weight: 300;
      font-size: 0.903vw;
      line-height: 2.083vw;
      color: #cfcfcf;
      text-transform: uppercase;
      text-decoration: none;
      letter-spacing: 0.03em;
      display: flex;
      flex-direction: column;
    }

    .ft__nav a {
      color: #cfcfcf;
      text-decoration: none;
      transition: color 0.25s ease;
    }
    .ft__nav a:hover { color: #fff; }

    /* ── Contact info ── */
    .ft__contact {
      position: absolute;
      left: 54.514vw;
      top: 9.931vw;
      font-weight: 300;
      font-size: 0.903vw;
      line-height: 2.083vw;
      color: #cfcfcf;
      display: flex;
      flex-direction: column;
    }

    .ft__contact a {
      color: #cfcfcf;
      text-decoration: none;
      transition: color 0.25s ease;
    }
    .ft__contact a:hover { color: #fff; }

    /* ── Let's Talk arrow ── */
    .ft__talk-btn {
      position: absolute;
      left: 73.264vw;
      top: 9.653vw;
      width: 2.778vw;
      height: 2.778vw;
      display: block;
      transition: transform 0.35s ease;
    }
    .ft__talk-btn:hover { transform: rotate(45deg); }

    .ft__talk-btn img {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Legal links ── */
    .ft__legal {
      position: absolute;
      top: 21.042vw;
      font-weight: 300;
      font-size: 0.972vw;
      line-height: 1.389vw;
      color: #cfcfcf;
      text-transform: uppercase;
      text-decoration: none;
      letter-spacing: 0.03em;
      transition: color 0.25s ease;
    }
    .ft__legal:hover { color: #fff; }

    .ft__legal-privacy { left: 73.264vw; }
    .ft__legal-terms   { left: 84.931vw; }
  </style>
</head>
<body>

<footer class="ft">

  <div class="ft__panel"></div>

  <img class="ft__logo" src="assets/ft_logo.svg" alt="TH" />

  <a href="#" class="ft__social ft__social-instagram">Instagram</a>
  <a href="#" class="ft__social ft__social-youtube">YouTube</a>
  <a href="#" class="ft__social ft__social-tiktok">TikTok</a>

  <p class="ft__col-title ft__col-title-nav">Navigation</p>
  <nav class="ft__nav">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Mentorship</a>
    <a href="#">Works</a>
    <a href="#">Method</a>
    <a href="#">Media</a>
  </nav>

  <p class="ft__col-title ft__col-title-contact">Contact</p>
  <div class="ft__contact">
    <a href="mailto:hello@tarashrytskiv.com">hello@tarashrytskiv.com</a>
    <a href="tel:+17472878064">+1 (747) 287 80 64</a>
    <span>Los Angeles, CA</span>
  </div>

  <p class="ft__col-title ft__col-title-talk">Let's Talk</p>
  <a href="#" class="ft__talk-btn">
    <img src="assets/ft_arrow.svg" alt="→" />
  </a>

  <a href="#" class="ft__legal ft__legal-privacy">Privacy Policy</a>
  <a href="#" class="ft__legal ft__legal-terms">Terms of Service</a>

</footer>

</body>
</html>
