<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobile Hero — Taras Hrytskiv</title>
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #030303;
      width: 390px;
      margin: 0 auto;
      overflow-x: hidden;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    /* ─── HERO SECTION ─── */
    .hero-mob {
      position: relative;
      width: 390px;
      height: 680px;
      background: #030303;
      overflow: hidden;
    }

    /* Portrait photo */
    .hero-mob__portrait {
      position: absolute;
      left: 52px;
      top: 7px;
      width: 338px;
      height: 673px;
      object-fit: cover;
      object-position: center top;
    }

    /* Instagram card screenshot */
    .hero-mob__insta-card {
      position: absolute;
      left: 5px;
      top: 97px;
      width: 262px;
      height: 263px;
      object-fit: cover;
      opacity: 0.4;
      border-radius: 4px;
    }

    /* Bottom gradient fade */
    .hero-mob__gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(3, 3, 3, 0) 59%,
        #030303 93.75%
      );
    }

    /* ── NAV ── */
    .hero-mob__logo {
      position: absolute;
      left: 20px;
      top: 33px;
      width: 32px;
      height: 32px;
    }

    .hero-mob__menu-btn {
      position: absolute;
      right: 19px;
      top: 22px;
      width: 45px;
      height: 45px;
    }

    /* ── SOCIAL ICONS ── */
    .hero-mob__socials {
      position: absolute;
      right: 20px;
      top: 135px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
    }

    .hero-mob__socials a {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-mob__socials img {
      display: block;
      opacity: 0.7;
    }

    .hero-mob__socials img.ic-insta  { width: 22px; height: 22px; }
    .hero-mob__socials img.ic-yt     { width: 26px; height: 26px; }
    .hero-mob__socials img.ic-tiktok { width: 26px; height: 26px; }

    /* ── HEADING ── */
    .hero-mob__heading {
      position: absolute;
      left: 20px;
      top: 308px;
      line-height: 50px;
      font-weight: 100;
      font-size: 55px;
      text-transform: uppercase;
      letter-spacing: 1.1px;
    }

    .hero-mob__heading .name-first {
      display: block;
      color: #ffffff;
    }

    .hero-mob__heading .name-last {
      display: block;
      color: #777165;
    }

    /* ── SUBTITLE ── */
    .hero-mob__subtitle {
      position: absolute;
      left: 20px;
      top: 422px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 300;
      font-size: 18px;
      line-height: 27px;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .hero-mob__subtitle .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #777165;
      flex-shrink: 0;
    }

    /* ── DESCRIPTION ── */
    .hero-mob__desc {
      position: absolute;
      left: 22px;
      top: 478px;
      width: 298px;
      font-weight: 300;
      font-size: 18px;
      line-height: 20px;
      color: #ffffff;
    }

    /* ── MORE DETAILS BUTTON ── */
    .hero-mob__btn {
      position: absolute;
      left: 20px;
      top: 585px;
      width: 350px;
      height: 70px;
      border: 1px solid #777165;
      border-radius: 150px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      text-decoration: none;
      cursor: pointer;
    }

    .hero-mob__btn span {
      font-weight: 300;
      font-size: 16px;
      letter-spacing: 1.68px;
      text-transform: uppercase;
      color: #777165;
    }

    .hero-mob__btn svg {
      width: 14px;
      height: 10px;
      stroke: #777165;
      fill: none;
      stroke-width: 1.5;
    }
  </style>
</head>
<body>

<section class="hero-mob">

  <!-- Portrait -->
  <img class="hero-mob__portrait"
       src="https://www.figma.com/api/mcp/asset/433bf458-1bfa-4d9a-9f6b-512a8b4265e5"
       alt="Taras Hrytskiv" />

  <!-- Instagram card -->
  <img class="hero-mob__insta-card"
       src="https://www.figma.com/api/mcp/asset/8d0f542d-eaf3-4e3f-b986-04767fabad4e"
       alt="" aria-hidden="true" />

  <!-- Bottom gradient -->
  <div class="hero-mob__gradient" aria-hidden="true"></div>

  <!-- Logo -->
  <img class="hero-mob__logo"
       src="https://www.figma.com/api/mcp/asset/eb77c72e-c1fa-4efd-bdd3-85fb27fd61b1"
       alt="TH" />

  <!-- Hamburger -->
  <img class="hero-mob__menu-btn"
       src="https://www.figma.com/api/mcp/asset/8d0935cd-c30b-41ac-8bf6-1da8ba96da65"
       alt="Menu" />

  <!-- Social icons -->
  <div class="hero-mob__socials">
    <a href="https://www.instagram.com/taras.cuts" target="_blank" aria-label="Instagram">
      <img class="ic-insta"
           src="https://www.figma.com/api/mcp/asset/a9b86521-8e81-464e-842f-fc1967dc0bb4"
           alt="Instagram" />
    </a>
    <a href="#" target="_blank" aria-label="YouTube">
      <img class="ic-yt"
           src="https://www.figma.com/api/mcp/asset/4651cd7a-0173-4872-869b-ecd1e2c4f846"
           alt="YouTube" />
    </a>
    <a href="#" target="_blank" aria-label="TikTok">
      <img class="ic-tiktok"
           src="https://www.figma.com/api/mcp/asset/a0f1d270-a5fd-4bcb-9f47-09f055124141"
           alt="TikTok" />
    </a>
  </div>

  <!-- Heading -->
  <h1 class="hero-mob__heading">
    <span class="name-first">Taras</span>
    <span class="name-last">Hrytskiv</span>
  </h1>

  <!-- Subtitle -->
  <div class="hero-mob__subtitle">
    <span>Barber</span>
    <span class="dot"></span>
    <span>Los Angeles</span>
  </div>

  <!-- Description -->
  <p class="hero-mob__desc">
    Barber, educator and mentor based in Los Angeles. Over 9 years of experience in barbering, education and professional development.
  </p>

  <!-- CTA Button -->
  <a href="#" class="hero-mob__btn">
    <span>More Details</span>
    <svg viewBox="0 0 14 10" xmlns="http://www.w3.org/2000/svg">
      <line x1="0" y1="5" x2="12" y2="5"/>
      <polyline points="8,1 13,5 8,9"/>
    </svg>
  </a>

</section>

</body>
</html>
