<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Block 6 — Press & Publications</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0c0c0c;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    /* ═══ BLOCK 6 ═══ */
    .b6 {
      position: relative;
      width: 100vw;
      height: 32.5vw;
      background: #0c0c0c;
      overflow: visible;
    }

    /* ── Entrance animations ── */
    @keyframes b6SlideLeft {
      from { opacity: 0; transform: translateX(-32px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes b6SlideRight {
      from { opacity: 0; transform: translateX(32px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .b6__heading,
    .b6__desc,
    .b6__nav,
    .b6__view-more,
    .b6__mag-wrap,
    .b6__read { opacity: 0; }

    .b6__heading.anim-in,
    .b6__desc.anim-in,
    .b6__nav.anim-in,
    .b6__view-more.anim-in  { animation: b6SlideLeft  0.7s ease forwards; }

    .b6__mag-wrap.anim-in,
    .b6__read.anim-in        { animation: b6SlideRight 0.7s ease forwards; }

    .b6__heading.anim-done,
    .b6__desc.anim-done,
    .b6__nav.anim-done,
    .b6__view-more.anim-done,
    .b6__mag-wrap.anim-done,
    .b6__read.anim-done      { opacity: 1; }

    /* ── Heading ── */
    .b6__heading {
      position: absolute;
      left: 9.375vw;
      top: 4.167vw;
      width: 32.014vw;
      font-weight: 100;
      font-size: 3.819vw;
      line-height: 3.819vw;
      text-transform: uppercase;
      color: #fff;
    }

    /* ── Description ── */
    .b6__desc {
      position: absolute;
      left: 16.181vw;
      top: 14.097vw;
      width: 18.472vw;
      font-weight: 300;
      font-size: 1.042vw;
      line-height: 1.319vw;
      color: #fff;
    }

    /* ── Nav arrows ── */
    .b6__nav {
      position: absolute;
      left: 9.583vw;
      top: 26.667vw;
      display: flex;
      gap: 0.417vw;
    }

    .b6__nav-btn {
      width: 3.472vw;
      height: 3.472vw;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.25s ease;
    }

    .b6__nav-btn:hover { transform: scale(1.12); }

    .b6__nav-btn img {
      width: 100%;
      height: 100%;
      display: block;
      transition: filter 0.25s ease;
    }

    .b6__nav-btn:hover img { filter: brightness(0) invert(1); }

    .b6__nav-btn--left img { transform: rotate(180deg); }

    /* ── View more ── */
    .b6__view-more {
      position: absolute;
      left: 18.75vw;
      top: 27.778vw;
      font-weight: 300;
      font-size: 1.111vw;
      line-height: 1.111vw;
      color: #686868;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      text-decoration: none;
    }

    .b6__view-more span {
      display: inline-block;
      width: 14.5vw; /* фиксированная ширина полного текста */
    }

    /* ── Magazine wrappers (3D tilt on hover) ── */
    .b6__mag-wrap {
      position: absolute;
      top: 4.167vw;
      width: 15.972vw;
      height: 22.639vw;
      cursor: pointer;
      transition: transform 0.45s ease, filter 0.45s ease;
      will-change: transform;
    }

    .b6__mag-wrap:hover {
      transform: perspective(700px) rotateY(-12deg) rotateX(4deg) scale(1.03);
      filter: drop-shadow(12px 24px 40px rgba(0,0,0,0.7));
    }

    .b6__mag-wrap-3 { left: 74.653vw; }        /* Esquire — original */
    .b6__mag-wrap-2 { left: 57.639vw; }        /* Forbes — 5px gap → shifted left */
    .b6__mag-wrap-1 { left: 40.625vw; }        /* Fast Company — 10px total → shifted left */

    /* ── Inner clip container ── */
    .b6__mag {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: relative;
    }

    .b6__mag img {
      position: absolute;
      display: block;
      pointer-events: none;
    }

    /* Fast Company — top-left of atlas */
    .b6__mag-1 img {
      width: 34.028vw;
      height: 48.125vw;
      left: -0.486vw;
      top: -0.833vw;
    }

    /* Forbes — top-right of atlas */
    .b6__mag-2 img {
      width: 34.028vw;
      height: 48.125vw;
      left: -17.222vw;
      top: -0.833vw;
    }

    /* journal03 — fits container exactly */
    .b6__mag-3 img {
      width: 100%;
      height: 100%;
      left: 0;
      top: 0;
      object-fit: cover;
    }

    /* ── READ MORE links ── */
    .b6__read {
      position: absolute;
      top: 27.917vw;
      display: flex;
      align-items: center;
      gap: 0.556vw;
      text-decoration: none;
      font-weight: 300;
      font-size: 0.972vw;
      line-height: 1.111vw;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .b6__read img {
      width: 0.729vw;
      height: 0.511vw;
      flex-shrink: 0;
      transition: transform 0.35s ease;
    }

    .b6__read:hover img {
      transform: rotate(-45deg);
    }

    .b6__read-1 { left: 40.625vw; }
    .b6__read-2 { left: 57.639vw; }
    .b6__read-3 { left: 74.653vw; }

    /* hover underline */
    .b6__read span {
      position: relative;
      padding-bottom: 0.1vw;
    }
    .b6__read span::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 0; height: 1px;
      background: #fff;
      transition: width 0.25s ease;
    }
    .b6__read:hover span::after { width: 100%; }
  </style>
</head>
<body>

<section class="b6">

  <h2 class="b6__heading">PRESS &amp;<br>PUBLICATIONS</h2>

  <p class="b6__desc">Insights, interviews, and editorial features sharing the experience, principles, and systems behind the brand.</p>

  <!-- Nav arrows -->
  <div class="b6__nav">
    <div class="b6__nav-btn b6__nav-btn--left">
      <img src="assets/b6_nav_right.svg" alt="prev" />
    </div>
    <div class="b6__nav-btn b6__nav-btn--right">
      <img src="assets/b6_nav_right.svg" alt="next" />
    </div>
  </div>

  <a href="#" class="b6__view-more"><span id="b6ViewMore"></span></a>

  <!-- Fast Company -->
  <div class="b6__mag-wrap b6__mag-wrap-1">
    <div class="b6__mag b6__mag-1">
      <img src="assets/b6_photo.webp" alt="Fast Company" />
    </div>
  </div>
  <a href="#" class="b6__read b6__read-1"><span>Read More</span><img src="assets/b6_arrow_sm.svg" alt="" /></a>

  <!-- Forbes -->
  <div class="b6__mag-wrap b6__mag-wrap-2">
    <div class="b6__mag b6__mag-2">
      <img src="assets/b6_photo.webp" alt="Forbes" />
    </div>
  </div>
  <a href="#" class="b6__read b6__read-2"><span>Read More</span><img src="assets/b6_arrow_sm.svg" alt="" /></a>

  <!-- Journal 03 -->
  <div class="b6__mag-wrap b6__mag-wrap-3">
    <div class="b6__mag b6__mag-3">
      <img src="assets/journal03.webp" alt="Journal 03" />
    </div>
  </div>
  <a href="#" class="b6__read b6__read-3"><span>Read More</span><img src="assets/b6_arrow_sm.svg" alt="" /></a>

</section>

<script>
  // ── Entrance animations ──
  (function() {
    function animIn(el) {
      el.classList.add('anim-in');
      el.addEventListener('animationend', () => {
        el.classList.remove('anim-in');
        el.classList.add('anim-done');
      }, { once: true });
    }

    const obs = new IntersectionObserver(entries => {
      if (!entries.some(e => e.isIntersecting)) return;
      entries.forEach(e => obs.unobserve(e.target));

      // ← left: heading → desc → nav → view-more
      setTimeout(() => animIn(document.querySelector('.b6__heading')),    0);
      setTimeout(() => animIn(document.querySelector('.b6__desc')),      100);
      setTimeout(() => animIn(document.querySelector('.b6__nav')),       200);
      setTimeout(() => animIn(document.querySelector('.b6__view-more')), 300);

      // → right: 3 magazines + read-more links, staggered
      document.querySelectorAll('.b6__mag-wrap').forEach((el, i) => {
        setTimeout(() => animIn(el), i * 100);
      });
      document.querySelectorAll('.b6__read').forEach((el, i) => {
        setTimeout(() => animIn(el), 200 + i * 100);
      });

    }, { threshold: 0.15 });

    obs.observe(document.querySelector('.b6'));
  })();

  // ── Typewriter ──
  (function() {
    const el   = document.getElementById('b6ViewMore');
    const full = 'View More Publication';
    let i = 0, deleting = false;
    function tick() {
      if (!deleting) {
        el.textContent = full.slice(0, i + 1); i++;
        if (i === full.length) { deleting = true; setTimeout(tick, 1400); return; }
        setTimeout(tick, 55);
      } else {
        el.textContent = full.slice(0, i - 1); i--;
        if (i === 0) { deleting = false; setTimeout(tick, 400); return; }
        setTimeout(tick, 30);
      }
    }
    setTimeout(tick, 600);
  })();
</script>

</body>
</html>
