<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Block 5 — The Method</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0c0c0c;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    /* ═══ BLOCK 5 ═══ */
    .b5 {
      position: relative;
      width: 100vw;
      height: 36.736vw;
      background: #0c0c0c;
      overflow: hidden;
    }

    /* ── Heading ── */
    .b5__heading {
      position: absolute;
      left: 9.375vw;
      top: 4.167vw;
      width: 32.014vw;
      font-weight: 100;
      font-size: 3.819vw;
      line-height: 3.819vw;
      text-transform: uppercase;
      color: #fff;
    }

    /* ── Subtitle ── */
    .b5__subtitle {
      position: absolute;
      left: 9.375vw;
      top: 23.403vw;
      width: 29.097vw;
      font-weight: 300;
      font-size: 1.736vw;
      line-height: 2.083vw;
      text-transform: uppercase;
    }

    .b5__subtitle .muted { color: #777165; }
    .b5__subtitle .bright { color: #fff; }

    /* ── Entrance animations (same as hero) ── */
    @keyframes b5SlideLeft {
      from { opacity: 0; transform: translateX(-32px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes b5SlideRight {
      from { opacity: 0; transform: translateX(32px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .b5__h-line   { display: block; opacity: 0; }
    .b5__subtitle { opacity: 0; }
    .b5__img-wrap { opacity: 0; }
    .b5__btn      { opacity: 0; }

    /* left: heading lines + subtitle */
    .b5__h-line.anim-in {
      animation: b5SlideLeft 0.7s ease forwards;
    }
    .b5__subtitle.anim-in {
      animation: b5SlideLeft 0.7s ease forwards;
    }

    /* right: photo + button */
    .b5__img-wrap.anim-in {
      animation: b5SlideRight 0.7s ease forwards;
    }
    .b5__btn.anim-in {
      animation: b5SlideRight 0.7s ease forwards;
    }

    .b5__h-line.anim-done,
    .b5__subtitle.anim-done,
    .b5__img-wrap.anim-done,
    .b5__btn.anim-done { opacity: 1; }

    /* ── Button ── */
    .b5__btn {
      position: absolute;
      left: 71.875vw;
      top: 29.306vw;
      width: 18.75vw;
      height: 4.167vw;
      border: 1px solid #777165;
      border-radius: 10.417vw;
      display: flex;
      align-items: center;
      padding: 0 2vw;
      justify-content: space-between;
      text-decoration: none;
      overflow: hidden;
      transition: border-color 0.5s ease;
    }

    .b5__btn::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 10.417vw;
      background: linear-gradient(90deg, #777165 0%, #0c0c0c 100%);
      clip-path: inset(0 100% 0 0 round 10.417vw);
      transition: clip-path 0.4s ease;
      z-index: 0;
    }

    .b5__btn:hover { border-color: #a09a8e; }
    .b5__btn:hover::after { clip-path: inset(0 0% 0 0 round 10.417vw); }

    .b5__btn span {
      font-weight: 300;
      font-size: 0.972vw;
      color: #777165;
      text-transform: uppercase;
      letter-spacing: 0.102vw;
      flex: 1;
      text-align: center;
      position: relative;
      z-index: 1;
      transition: color 0.4s ease;
    }

    .b5__btn:hover span { color: #fff; }

    .b5__btn .arrow {
      width: 0.934vw;
      height: 0.934vw;
      transform: rotate(-135deg);
      position: relative;
      z-index: 1;
      transition: transform 0.35s ease, filter 0.4s ease;
    }

    .b5__btn:hover .arrow {
      transform: rotate(-90deg);
      filter: brightness(10);
    }

    /* ── Image ── */
    .b5__img-wrap {
      position: absolute;
      left: 33.958vw;
      top: 2.847vw;
      width: 45.185vw;
      height: 33.889vw;
      overflow: hidden;
      clip-path: inset(1.319vw 10.741vw 3.264vw 8.611vw);
      cursor: pointer;
      transition: transform 0.65s cubic-bezier(0.34, 1.56, 0.64, 1);
      will-change: transform;
    }

    .b5__img-wrap:hover {
      transform: scale(1.06);
    }

    .b5__img-wrap img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      pointer-events: none;
    }
  </style>
</head>
<body>

<section class="b5">

  <h2 class="b5__heading">
    <span class="b5__h-line">THE METHOD OF</span>
    <span class="b5__h-line">A SUCCESSFUL</span>
    <span class="b5__h-line">BARBER</span>
  </h2>

  <p class="b5__subtitle">
    <span class="muted">A proprietary system<br>for professional barber<br>development</span><span class="bright">, built on over 9<br>years of hands-on experience<br>in the barbering industry</span>
  </p>

  <a href="#" class="b5__btn">
    <span>More Details</span>
    <img class="arrow" src="assets/b4_arrow.svg" alt="" />
  </a>

  <div class="b5__img-wrap">
    <img src="assets/b5_photo.webp" alt="The Method of a Successful Barber" />
  </div>

</section>

<script>
  (function() {
    function animIn(el) {
      el.classList.add('anim-in');
      el.addEventListener('animationend', () => {
        el.classList.remove('anim-in');
        el.classList.add('anim-done');
      }, { once: true });
    }

    const obs = new IntersectionObserver(entries => {
      if (!entries.some(e => e.isIntersecting)) return;
      entries.forEach(e => obs.unobserve(e.target));

      // ← left: heading lines (chain)
      document.querySelectorAll('.b5__h-line').forEach((el, i) => {
        setTimeout(() => animIn(el), i * 100);
      });
      // ← left: subtitle after heading
      setTimeout(() => animIn(document.querySelector('.b5__subtitle')), 300);

      // → right: photo + button (chain)
      setTimeout(() => animIn(document.querySelector('.b5__img-wrap')), 100);
      setTimeout(() => animIn(document.querySelector('.b5__btn')),      300);

    }, { threshold: 0.15 });

    obs.observe(document.querySelector('.b5'));
  })();
</script>
</body>
</html>
